<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sky SignUp Code</title>
    <link rel="stylesheet" href="Code.css">
    <link rel="icon" type="image/x-icon" href="../../Images/Sky4-1.ico">

</head>
    <body>
        <div class="container">
            <div class="SkyImage">
                <img src="../../Images/Sky5.png">
            </div>

            <form class="SignUpCode"> <!--کد تایید به شماره شما ارسال شد لطفا کد را در کادر پایین بنویسید-->
                <p class="SkyText"><span class="one">کد</span> <span class="two">تایید</span> <span class="three">به</span> <span class="four">شماره</span> <span class="five">شما</span> <span class="six">ارسال</span> <span class="seven">شد</span> <span class="eight">لطفا</span> <span class="nine">کد</span> <span class="ten">را</span> <span class="eleven">در</span> <span class="twelve">کادر</span> <span class="thirteen">پایین</span> <span class="fourteen">بنویسید</span></p>
                <input type="text" placeholder="Enter Code" class="text">
                <input type="submit" value="Confirm" class="button">
            </form>
        </div>

        <!-- <script src="Code.js"></script> -->
    </body>
</html>
